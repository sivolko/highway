backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - label: "Posts"
    name: "posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{title}}"
    extension: "md"
    fields:
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss"
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
      - label: "Description"
        name: "description"
        hint: "Used for SEO and search previews."
        widget: "string"
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "road-trip"
          - "adventure"
          - "gear"
          - "destinations"
          - "tips"
          - "stories"
      - label: "Tags"
        name: "tags"
        hint: "Comma separated. Also used as SEO keywords."
        widget: "list"
      - label: "Author"
        name: "author"
        widget: "relation"
        collection: "authors"
        displayFields: [display_name]
        searchFields: [display_name]
        valueField: "name"
      - label: "Body"
        name: "body"
        widget: "markdown"

  - label: "Authors"
    name: "authors"
    folder: "_authors"
    create: true
    editor:
      preview: false
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "author"
      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
      - label: "Short Name"
        name: "name"
        widget: "string"
      - label: "Display Name"
        name: "display_name"
        widget: "string"
      - label: "Position"
        name: "position"
        widget: "string"
        required: false
      - label: "Bio"
        name: "bio"
        widget: "text"
      - label: "GitHub Username"
        name: "github_username"
        widget: "string"
        required: false
      - label: "Twitter Username"
        name: "twitter_username"
        widget: "string"
        required: false
      - label: "LinkedIn Username"
        name: "linkedin_username"
        widget: "string"
        required: false
