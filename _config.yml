# ── Site ──────────────────────────────────────────────
title: "unplotted"
name:  "unplotted"
description: "Road stories, travel guides, and adventures for the restless soul. Updated weekly."
baseurl: ""
url: "https://unplotted.online"
language: en
timezone: UTC

# ── Author ────────────────────────────────────────────
author:
  name: Shubhendu Shubham
  twitter: myselfshubhendu
  url: https://unplotted.online/about

social:
  name: Shubhendu Shubham
  links:
    - https://twitter.com/myselfshubhendu
    - https://github.com/sivolko
    - https://linkedin.com/in/shubhendu-shubham

# ── Social handles ────────────────────────────────────
email: shubhendushubham98@gmail.com
github_username:   sivolko
twitter_username:  myselfshubhendu
linkedin_username: shubhendu-shubham
medium_username:   shubhendushubham

twitter:
  username: myselfshubhendu
  card: summary_large_image

# ── Nav menu ──────────────────────────────────────────
menu:
  - title: Home
    url: "/"
  - title: About
    url: "/about"
  - title: Tags
    url: "/tags"
  - title: Contact
    url: "/contact"

# ── Build ─────────────────────────────────────────────
markdown:   kramdown
highlighter: rouge
permalink:  /:slug

paginate:      12
paginate_path: "/page/:num"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# ── Collections ───────────────────────────────────────
collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /post/:slug/
  authors:
    output: true
    permalink: /:name

# ── Defaults ──────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Shubhendu Shubham"
      image: "/images/default.jpg"
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: "tag"
      type: "pages"
    values:
      layout: "tag"

# ── Tag pages (theme requirement) ────────────────────
tag_page_layout: tag
tag_page_dir:    tag

# ── Sass ──────────────────────────────────────────────
sass:
  sass_dir: _sass
  style: compressed

# ── Analytics ─────────────────────────────────────────
google_analytics: G-XXXXXXXXXX   # replace with real GA4 ID

# ── Comments (Giscus) ────────────────────────────────
comments:
  giscus:
    enabled: true
    repo: "sivolko/highway"
    repo-id: ""
    category: "General"
    category-id: ""
    mapping: "title"
    strict: "1"
    reactions-enabled: "1"
    emit-metadata: "0"
    input-position: "bottom"
    theme: "dark"
    lang: "en"
    loading: "lazy"
    crossorigin: "anonymous"

# ── CMS / UI flags ───────────────────────────────────
show_hero:             true
show_time_bar:         true
show_modal_on_exit:    false
show_modal_on_finish_post: true
two_columns_layout:    true
categories_folder:     category
sent_message_url:      "/contact/message-sent/"
disqus_username:       highwaynomads

# ── Exclude from build ────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
  - package.json
  - package-lock.json
  - docker-compose.yml
  - FIREBASE_CMS_SETUP.md
  - cms/node_modules
  - cms/dist
