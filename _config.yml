title: Highway Nomads
timezone: UTC
name: Highway Nomads
description: Road stories, travel guides, and adventures for the restless soul. Updated weekly.
tags:
  - blog
  - travel
  - nomad
  - adventure
  - roadtrip

author:
  name: Shubhendu Shubham
  twitter: myselfshubhendu
  url: https://highwaynomads.org/about

social:
  name: Shubhendu Shubham
  links:
    - https://twitter.com/myselfshubhendu
    - https://github.com/sivolko
    - https://linkedin.com/in/shubhendu-shubham

logo: /images/logo.png
show_hero: true

menu:
  - title: Home
    url: "/"
  - title: About
    url: "/about"
  - title: Tags
    url: "/tags"
  - title: Contact
    url: "/contact"

email: shubhendushubham98@gmail.com
disqus_username: highwaynomads
github_username: sivolko
twitter_username: myselfshubhendu
linkedin_username: shubhendu-shubham
medium_username: shubhendushubham

twitter:
  username: myselfshubhendu
  card: summary_large_image

show_time_bar: true
show_modal_on_exit: false
show_modal_on_finish_post: true
two_columns_layout: true

baseurl: ""
url: "https://highwaynomads.org"
google_analytics: G-XXXXXXXXXX
language: en
categories_folder: category
sent_message_url: "/contact/message-sent/"

markdown: kramdown
highlighter: rouge
permalink: "/:title/"
paginate: 12
paginate_path: "/page/:num/"

collections:
  authors:
    title: Authors
    output: true
  posts:
    title: Posts
    output: true

sass:
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - package.json
  - package-lock.json
  - node_modules
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

comments:
  giscus:
    enabled: true
    repo: "sivolko/highway"
    repo-id: ""
    category: "General"
    category-id: ""
    mapping: "title"
    strict: "1"
    reactions-enabled: "1"
    emit-metadata: "0"
    input-position: "bottom"
    theme: "dark"
    lang: "en"
    loading: "lazy"
    crossorigin: "anonymous"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      author: "Shubhendu Shubham"
      image: "/images/default.jpg"
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
