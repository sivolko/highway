<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body class="{% if page.url == '/' %}home-page{% endif %}">

  <!-- begin global wrap -->
  <div class="global-wrap">

    {% include header.html %}

    <!-- begin content -->
    <main class="content" aria-label="Content">
      {{ content }}
    </main>
    <!-- end content -->

    {% include footer.html %}
  </div>
  <!-- end global wrap -->

  <!-- Scripts deferred — parsed in parallel, executed after HTML -->
  <script src="{{ site.baseurl }}/js/scripts.js" defer></script>
  <script src="{{ site.baseurl }}/js/common.js" defer></script>

  <!-- Google Analytics — last, non-critical -->
  {% if site.data.settings.google_analytics %}
    {% include google-analytics.html %}
  {% endif %}

</body>

</html>
