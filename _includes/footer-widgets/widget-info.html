<div class="col col-4 col-d-12">
  <div class="widget-footer widget-info">

    <div class="logo-footer">
      <a class="logo-footer__link widget-title" href="{{ site.baseurl }}/"
         style="color:#22c55e;font-weight:700;font-size:1.15rem;letter-spacing:-0.02em;text-decoration:none;">
        {{ site.data.settings.title }}
      </a>
    </div>

    {% if site.data.settings.footer_description %}
    <p class="widget-footer__desc">{{ site.data.settings.footer_description }}</p>
    {% endif %}

    {% if site.data.settings.social %}
    <div class="social">
      <ul class="social__list list-reset">
        {% for social in site.data.settings.social %}
        <li class="social__item">
          <a class="social__link" href="{{ social.link }}" target="_blank" rel="noopener"
            aria-label="{{ social.icon | capitalize }} link"><i class="ion ion-logo-{{ social.icon }}"></i></a>
        </li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

  </div>
</div>
